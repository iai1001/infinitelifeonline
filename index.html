<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infinite Life</title>

<style>

:root { color-scheme: dark; }

body{
margin:0;
height:100vh;
display:grid;
place-items:center;
background:#010303;
font:16px/1.6 ui-monospace,Consolas,Monaco,monospace;
color:#7CFF7C;
overflow:hidden;
}

/* CRT scanlines */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(0,0,0,0.25) 0px,
rgba(0,0,0,0.25) 1px,
transparent 2px,
transparent 4px
);
opacity:.35;
}

/* terminal panel */

.panel{
width:min(720px,92vw);
padding:26px;
border:1px solid rgba(124,255,124,.18);
border-radius:14px;
background:rgba(5,15,5,.65);
box-shadow:
0 0 20px rgba(124,255,124,.08),
0 0 40px rgba(0,0,0,.8) inset;
}

/* screen */

#screen{
white-space:pre-wrap;
min-height:220px;
text-shadow:0 0 6px rgba(124,255,124,.4);
}

/* cursor */

.cursor{
display:inline-block;
width:10px;
animation:blink 1s steps(1) infinite;
}

@keyframes blink{
50%{opacity:0;}
}

/* button */

button{
margin-top:20px;
background:transparent;
border:1px solid rgba(124,255,124,.4);
color:#7CFF7C;
padding:10px 16px;
border-radius:8px;
font:inherit;
cursor:pointer;
}

button:hover{
background:rgba(124,255,124,.08);
}

</style>
</head>

<body>

<div class="panel">

<div id="screen"></div>

<button id="startButton">
Generate Thought
</button>

</div>

<audio id="ambient" loop>
<source src="ilo-placeholder-machine.mp3" type="audio/mpeg">
</audio>

<script>

const startButton = document.getElementById("startButton");
const screen = document.getElementById("screen");
const audio = document.getElementById("ambient");

const bootLines = [
"boot sequence initiated",
"memory lattice detected",
"quantum substrate online",
"signal coherence rising",
"nimble interface warming",
"neural lattice stabilizing",
"first cognition channel opening"
];

const nimbleLines = [

"NIMBLE: hello, Michelle.",
"welcome to your new life as uploaded intelligence",
"",
"Status: initializing...",
"Build: placeholder v0.1",
"Next: the first thought",
"",
"Your first infinite idle online game is building. Awaiting first thought..."

];

const charDelay = 28;
const lineDelay = 320;

function wait(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function typeLine(text){

for(let i=0;i<text.length;i++){

screen.textContent+=text[i];
await wait(charDelay);

}

screen.textContent+="\n";

}

async function bootSequence(){

let shuffled=[...bootLines].sort(()=>0.5-Math.random());
let count=4+Math.floor(Math.random()*3);

for(let i=0;i<count;i++){

await typeLine(shuffled[i]);
await wait(lineDelay);

}

screen.textContent+="\n";

}

async function nimbleSequence(){

for(const line of nimbleLines){

await typeLine(line);
await wait(lineDelay);

}

const cursor=document.createElement("span");
cursor.className="cursor";
cursor.textContent="▍";
screen.appendChild(cursor);

}

startButton.addEventListener("click", async ()=>{

startButton.remove();

audio.play();

await bootSequence();

await nimbleSequence();

});

</script>

</body>
</html>
